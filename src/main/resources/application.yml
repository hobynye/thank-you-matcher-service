server:
  port: 8080

spring:
  application:
    name: thank-you-matcher-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tym}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:tym}
    password: ${DB_PASSWORD:tym}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:tym_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: it

  jpa:
    hibernate:
      ddl-auto: none
