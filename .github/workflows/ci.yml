name: CI

on:
  push:
    branches: [ main, beta, alpha ]
  pull_request:
    branches: [ main, beta, alpha ]

permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    name: Tests (${{ matrix.test-type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Compile once per job, no tests
      - name: Compile
        run: mvn -B -ntp -DskipTests=true -DskipITs=true compile

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: mvn -B -ntp test jacoco:report

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: mvn -B -ntp -DskipUTs=true verify

      - name: Upload unit coverage
        if: matrix.test-type == 'unit'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jacoco-unit
          path: target/site/jacoco

      - name: Upload integration coverage
        if: matrix.test-type == 'integration'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jacoco-integration
          path: target/site/jacoco-it

  sonar:
    name: Sonar Scan & Quality Gate
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: '0'

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Download unit coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: jacoco-unit
          path: target/site/jacoco

      - name: Download integration coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: jacoco-integration
          path: target/site/jacoco-it

      - name: Sonar scan (Quality Gate enforced)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST: ${{ vars.SONAR_HOST }}
          SONAR_ORG: ${{ vars.SONAR_ORG }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          echo "Running Sonar PR analysis"
          
          mvn -B -ntp -DskipUTs=true -DskipITs=true verify sonar:sonar \
            -Dsonar.token=${{ env.SONAR_TOKEN }} \
            -Dsonar.host.url=${{ env.SONAR_HOST }} \
            -Dsonar.organization=${{ env.SONAR_ORG }} \
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
            -Dsonar.qualitygate.wait=true
