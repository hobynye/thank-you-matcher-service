name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    name: Tests (${{ matrix.test-type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration]

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Compile once per job, no tests
      - name: Compile
        run: mvn -B -ntp -DskipTests=true -DskipITs=true compile

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: mvn -B -ntp test jacoco:report

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn -B -ntp verify -DskipTests=true jacoco:report-integration

      - name: Upload unit coverage
        if: matrix.test-type == 'unit'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jacoco-unit
          path: target/site/jacoco

      - name: Upload integration coverage
        if: matrix.test-type == 'integration'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jacoco-integration
          path: target/site/jacoco-it

  sonar:
    name: Sonar Scan & Quality Gate
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: '0'

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Download unit coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: jacoco-unit
          path: target/site/jacoco

      - name: Download integration coverage
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: jacoco-integration
          path: target/site/jacoco-it

      - name: Sonar scan (Quality Gate enforced)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST: ${{ vars.SONAR_HOST }}
          SONAR_ORG: ${{ vars.SONAR_ORG }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          echo "Running Sonar PR analysis"
          
          mvn -B -ntp -DskipTests -DskipITs verify sonar:sonar \
            -Dsonar.token=${{ env.SONAR_TOKEN }} \
            -Dsonar.host.url=${{ env.SONAR_HOST }} \
            -Dsonar.organization=${{ env.SONAR_ORG }} \
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
            -Dsonar.qualitygate.wait=true